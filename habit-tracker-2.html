<!DOCTYPE html>
<html lang="id" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HabitFlow — Habit Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet" />

  <style>
    /* ============================================================
       CSS VARIABLES — tema light & dark
    ============================================================ */
    :root {
      --bg:          #0A0F1E;
      --surface:     #0D1426;
      --surface-2:   #111A30;
      --border:      #1C2A45;
      --text-primary:#E8F0FF;
      --text-secondary:#7A9CC4;
      --text-muted:  #3A5278;
      --accent:      #3B82F6;
      --accent-light:#0F2040;
      --accent-dark: #60A5FA;
      --green:       #22D3EE;
      --green-light: #082030;
      --shadow:      0 2px 12px rgba(0,0,0,.4);
      --shadow-md:   0 4px 24px rgba(59,130,246,.15);
      --radius:      16px;
      --radius-sm:   10px;
      --transition:  .2s cubic-bezier(.4,0,.2,1);
    }

    [data-theme="dark"] {
      --bg:          #060C18;
      --surface:     #0A1020;
      --surface-2:   #0D1528;
      --border:      #162038;
      --text-primary:#E8F0FF;
      --text-secondary:#6B8CB8;
      --text-muted:  #2E4568;
      --accent:      #3B82F6;
      --accent-light:#0A1830;
      --accent-dark: #60A5FA;
      --green:       #22D3EE;
      --green-light: #061825;
      --shadow:      0 2px 12px rgba(0,0,0,.5);
      --shadow-md:   0 4px 24px rgba(59,130,246,.2);
    }

    /* ============================================================
       RESET & BASE
    ============================================================ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      min-height: 100vh;
      transition: background var(--transition), color var(--transition);
      -webkit-font-smoothing: antialiased;
    }

    /* Grid overlay untuk efek seperti portfolio */
    body::after {
      content: '';
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background-image:
        linear-gradient(rgba(59,130,246,.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(59,130,246,.04) 1px, transparent 1px);
      background-size: 40px 40px;
    }

    /* ============================================================
       LAYOUT
    ============================================================ */
    .app {
      position: relative; z-index: 1;
      max-width: 680px;
      margin: 0 auto;
      padding: 24px 16px 80px;
    }

    /* ============================================================
       HEADER
    ============================================================ */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 32px;
    }

    .logo {
      display: flex; flex-direction: column; gap: 0;
    }

    .logo-title {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 1.6rem;
      letter-spacing: -0.04em;
      color: var(--text-primary);
      line-height: 1;
    }

    .logo-sub {
      font-size: .72rem;
      color: var(--text-muted);
      letter-spacing: .12em;
      text-transform: uppercase;
      margin-top: 3px;
    }

    .header-actions {
      display: flex; gap: 10px; align-items: center;
    }

    .btn-icon {
      width: 40px; height: 40px;
      border-radius: 50%;
      border: 1.5px solid var(--border);
      background: var(--surface);
      color: var(--text-secondary);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all var(--transition);
      font-size: 1rem;
    }

    .btn-icon:hover {
      background: var(--surface-2);
      color: var(--text-primary);
      transform: scale(1.06);
    }

    .btn-add {
      display: flex; align-items: center; gap: 7px;
      padding: 10px 18px;
      border-radius: 999px;
      background: var(--accent);
      color: #fff;
      border: none;
      font-family: 'DM Sans', sans-serif;
      font-size: .85rem;
      font-weight: 500;
      cursor: pointer;
      transition: all var(--transition);
      white-space: nowrap;
      box-shadow: 0 2px 8px rgba(59,130,246,.3);
    }

    .btn-add:hover {
      background: var(--accent-dark);
      transform: translateY(-1px);
      box-shadow: 0 4px 14px rgba(59,130,246,.35);
    }

    .btn-add:active { transform: scale(.97); }

    /* ============================================================
       DATE STRIP — 7 hari terakhir
    ============================================================ */
    .date-strip {
      display: flex;
      gap: 8px;
      margin-bottom: 28px;
      overflow-x: auto;
      padding-bottom: 4px;
      scrollbar-width: none;
    }
    .date-strip::-webkit-scrollbar { display: none; }

    .date-chip {
      flex: 0 0 auto;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      width: 56px; height: 64px;
      border-radius: var(--radius-sm);
      background: var(--surface);
      border: 1.5px solid var(--border);
      cursor: pointer;
      transition: all var(--transition);
      gap: 2px;
    }

    .date-chip:hover { border-color: var(--accent); }

    .date-chip.active {
      background: var(--accent);
      border-color: var(--accent);
      box-shadow: 0 4px 12px rgba(59,130,246,.3);
    }

    .date-chip .day-name {
      font-size: .65rem;
      font-weight: 500;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    .date-chip .day-num {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 1.1rem;
      color: var(--text-primary);
    }

    .date-chip.active .day-name,
    .date-chip.active .day-num { color: #fff; }

    .date-chip .dot-row {
      display: flex; gap: 2px; margin-top: 2px;
    }

    .dot {
      width: 4px; height: 4px;
      border-radius: 50%;
      background: var(--border);
    }

    .dot.done { background: var(--green); }
    .date-chip.active .dot { background: rgba(255,255,255,.4); }
    .date-chip.active .dot.done { background: #fff; }

    /* ============================================================
       STATISTIK HARIAN
    ============================================================ */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 28px;
    }

    .stat-card {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      display: flex; flex-direction: column; gap: 4px;
      transition: background var(--transition), border-color var(--transition);
    }

    .stat-label {
      font-size: .7rem;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--text-muted);
      font-weight: 500;
    }

    .stat-value {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 1.6rem;
      color: var(--text-primary);
      line-height: 1.1;
    }

    .stat-sub {
      font-size: .72rem;
      color: var(--text-secondary);
    }

    /* Progress bar harian */
    .progress-bar {
      height: 5px;
      border-radius: 99px;
      background: var(--surface-2);
      overflow: hidden;
      margin-top: 6px;
    }

    .progress-fill {
      height: 100%;
      border-radius: 99px;
      background: linear-gradient(90deg, #3B82F6, #22D3EE);
      transition: width .6s cubic-bezier(.4,0,.2,1);
    }

    /* ============================================================
       HABIT LIST
    ============================================================ */
    .section-title {
      font-family: 'Syne', sans-serif;
      font-weight: 600;
      font-size: .8rem;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 12px;
    }

    .habit-list {
      display: flex; flex-direction: column; gap: 10px;
    }

    .habit-card {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 18px;
      display: flex; align-items: center; gap: 14px;
      transition: all var(--transition);
      animation: slideIn .3s ease both;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .habit-card:hover { box-shadow: var(--shadow-md); }

    .habit-card.done-card {
      border-color: var(--green-light);
      background: var(--green-light);
    }

    [data-theme="dark"] .habit-card.done-card {
      background: var(--green-light);
      border-color: var(--green);
    }

    /* Custom Checkbox */
    .custom-checkbox {
      flex: 0 0 auto;
      width: 26px; height: 26px;
      border-radius: 8px;
      border: 2px solid var(--border);
      background: transparent;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all var(--transition);
      position: relative;
      overflow: hidden;
    }

    .custom-checkbox:hover {
      border-color: var(--green);
    }

    .custom-checkbox.checked {
      background: var(--green);
      border-color: var(--green);
    }

    .check-icon {
      opacity: 0;
      transform: scale(0) rotate(-20deg);
      transition: all .2s cubic-bezier(.34,1.56,.64,1);
      color: white;
      font-size: .85rem;
    }

    .custom-checkbox.checked .check-icon {
      opacity: 1;
      transform: scale(1) rotate(0deg);
    }

    /* Ripple saat dicentang */
    .ripple {
      position: absolute;
      width: 60px; height: 60px;
      background: var(--green);
      border-radius: 50%;
      opacity: 0;
      transform: scale(0);
      pointer-events: none;
    }

    .ripple.animate {
      animation: rippleOut .5s ease forwards;
    }

    @keyframes rippleOut {
      to { transform: scale(2); opacity: 0; }
    }

    /* Habit info */
    .habit-info {
      flex: 1; min-width: 0;
    }

    .habit-name {
      font-weight: 500;
      font-size: .95rem;
      color: var(--text-primary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      transition: color var(--transition);
    }

    .habit-card.done-card .habit-name {
      color: var(--green);
      text-decoration: line-through;
      text-decoration-color: var(--green);
    }

    .habit-target {
      font-size: .75rem;
      color: var(--text-muted);
      margin-top: 1px;
    }

    /* Streak badge */
    .streak-badge {
      display: flex; align-items: center; gap: 4px;
      background: var(--accent-light);
      color: var(--accent-dark);
      font-size: .72rem;
      font-weight: 600;
      padding: 4px 9px;
      border-radius: 99px;
      white-space: nowrap;
      flex: 0 0 auto;
    }

    /* Habit action buttons */
    .habit-actions {
      display: flex; gap: 4px;
    }

    .habit-btn {
      width: 30px; height: 30px;
      border: none;
      background: transparent;
      color: var(--text-muted);
      cursor: pointer;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: .85rem;
      transition: all var(--transition);
    }

    .habit-btn:hover { background: var(--surface-2); color: var(--text-primary); }
    .habit-btn.delete:hover { background: #FFE4E4; color: #C0392B; }

    /* ============================================================
       EMPTY STATE
    ============================================================ */
    .empty-state {
      text-align: center;
      padding: 48px 24px;
      color: var(--text-muted);
    }

    .empty-icon {
      font-size: 3rem;
      margin-bottom: 12px;
      opacity: .5;
    }

    .empty-title {
      font-family: 'Syne', sans-serif;
      font-weight: 600;
      font-size: 1rem;
      color: var(--text-secondary);
      margin-bottom: 6px;
    }

    .empty-desc { font-size: .85rem; }

    /* ============================================================
       MODAL
    ============================================================ */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.45);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      display: flex; align-items: flex-end;
      justify-content: center;
      z-index: 100;
      opacity: 0;
      pointer-events: none;
      transition: opacity var(--transition);
    }

    @media (min-width: 480px) {
      .modal-overlay { align-items: center; }
    }

    .modal-overlay.open { opacity: 1; pointer-events: all; }

    .modal {
      background: var(--surface);
      border-radius: var(--radius) var(--radius) 0 0;
      padding: 28px 24px 36px;
      width: 100%;
      max-width: 480px;
      transform: translateY(60px);
      transition: transform .35s cubic-bezier(.4,0,.2,1);
    }

    @media (min-width: 480px) {
      .modal { border-radius: var(--radius); transform: scale(.95) translateY(20px); }
      .modal-overlay.open .modal { transform: scale(1) translateY(0); }
    }

    .modal-overlay.open .modal { transform: translateY(0); }

    .modal-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 24px;
    }

    .modal-title {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 1.15rem;
    }

    .modal-close {
      width: 32px; height: 32px;
      border: none; background: var(--surface-2);
      border-radius: 50%;
      cursor: pointer; color: var(--text-secondary);
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem;
      transition: all var(--transition);
    }

    .modal-close:hover { background: var(--border); color: var(--text-primary); }

    .form-group {
      margin-bottom: 18px;
    }

    label {
      display: block;
      font-size: .78rem;
      font-weight: 500;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 7px;
    }

    input[type="text"] {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--surface-2);
      color: var(--text-primary);
      font-family: 'DM Sans', sans-serif;
      font-size: .95rem;
      outline: none;
      transition: border-color var(--transition);
    }

    input[type="text"]:focus {
      border-color: var(--accent);
      background: var(--surface);
    }

    .btn-submit {
      width: 100%;
      padding: 13px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius-sm);
      font-family: 'DM Sans', sans-serif;
      font-size: .95rem;
      font-weight: 500;
      cursor: pointer;
      margin-top: 6px;
      transition: all var(--transition);
      box-shadow: 0 2px 10px rgba(59,130,246,.25);
    }

    .btn-submit:hover {
      background: var(--accent-dark);
      transform: translateY(-1px);
      box-shadow: 0 4px 14px rgba(59,130,246,.35);
    }

    .btn-submit:active { transform: scale(.98); }

    /* ============================================================
       TOAST NOTIFIKASI
    ============================================================ */
    .toast-container {
      position: fixed;
      bottom: 24px; left: 50%;
      transform: translateX(-50%);
      z-index: 200;
      display: flex; flex-direction: column; gap: 8px;
      pointer-events: none;
    }

    .toast {
      background: var(--text-primary);
      color: var(--bg);
      padding: 10px 18px;
      border-radius: 99px;
      font-size: .82rem;
      font-weight: 500;
      white-space: nowrap;
      animation: toastIn .35s ease both, toastOut .3s .2s ease forwards;
      animation-delay: 0s, 2.4s;
      box-shadow: var(--shadow-md);
    }

    @keyframes toastIn {
      from { opacity: 0; transform: translateY(10px) scale(.9); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    @keyframes toastOut {
      to { opacity: 0; transform: translateY(-6px) scale(.95); }
    }

    /* ============================================================
       FOOTER / CREDITS
    ============================================================ */
    .app-footer {
      text-align: center;
      margin-top: 48px;
      color: var(--text-muted);
      font-size: .72rem;
      letter-spacing: .06em;
    }

    /* ============================================================
       RESPONSIVE
    ============================================================ */
    @media (max-width: 400px) {
      .stats-row { grid-template-columns: repeat(3, 1fr); }
      .stat-value { font-size: 1.3rem; }
      .btn-add span { display: none; }
    }
  </style>
</head>

<body>
<div class="app">

  <!-- ============================================================
       HEADER
  ============================================================ -->
  <header>
    <div class="logo">
      <span class="logo-title">HabitFlow</span>
      <span class="logo-sub" id="todayLabel">Loading…</span>
    </div>
    <div class="header-actions">
      <!-- Dark mode toggle -->
      <button class="btn-icon" id="themeToggle" title="Toggle dark mode">🌙</button>
      <!-- Tambah habit -->
      <button class="btn-add" id="openModal">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <path d="M7 1v12M1 7h12" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
        </svg>
        <span>Habit Baru</span>
      </button>
    </div>
  </header>

  <!-- ============================================================
       DATE STRIP — 7 hari terakhir
  ============================================================ -->
  <div class="date-strip" id="dateStrip"></div>

  <!-- ============================================================
       STATISTIK
  ============================================================ -->
  <div class="stats-row">
    <div class="stat-card">
      <span class="stat-label">Selesai</span>
      <span class="stat-value" id="statDone">0</span>
      <span class="stat-sub" id="statDoneOf">dari 0 habit</span>
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill" style="width:0%"></div>
      </div>
    </div>
    <div class="stat-card">
      <span class="stat-label">Streak</span>
      <span class="stat-value" id="statStreak">0</span>
      <span class="stat-sub">hari terbaik</span>
    </div>
    <div class="stat-card">
      <span class="stat-label">Progress</span>
      <span class="stat-value" id="statPercent">0%</span>
      <span class="stat-sub">hari ini</span>
    </div>
  </div>

  <!-- ============================================================
       HABIT LIST
  ============================================================ -->
  <div class="section-title">Habit Hari Ini</div>
  <div class="habit-list" id="habitList"></div>

  <p class="app-footer">HabitFlow · Data tersimpan di browser Anda</p>
</div>

<!-- ============================================================
     MODAL TAMBAH / EDIT
============================================================ -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="modalTitle">Tambah Habit</span>
      <button class="modal-close" id="closeModal">✕</button>
    </div>

    <div class="form-group">
      <label for="inputName">Nama Habit</label>
      <input type="text" id="inputName" placeholder="cth: Baca buku 15 menit" maxlength="60" />
    </div>

    <div class="form-group">
      <label for="inputTarget">Target Harian</label>
      <input type="text" id="inputTarget" placeholder="cth: 1 kali sehari" maxlength="60" />
    </div>

    <button class="btn-submit" id="submitModal">Simpan Habit</button>
  </div>
</div>

<!-- Toast container -->
<div class="toast-container" id="toastContainer"></div>

<!-- ============================================================
     JAVASCRIPT
============================================================ -->
<script>
  /* ----------------------------------------------------------
     UTILITAS TANGGAL
  ---------------------------------------------------------- */
  /** Kembalikan string 'YYYY-MM-DD' dari Date object */
  const dateKey = (d = new Date()) =>
    `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;

  const TODAY = dateKey();

  const DAYS   = ['Min','Sen','Sel','Rab','Kam','Jum','Sab'];
  const MONTHS = ['Jan','Feb','Mar','Apr','Mei','Jun','Jul','Agt','Sep','Okt','Nov','Des'];

  /** Buat array 7 hari terakhir (termasuk hari ini) */
  function getLast7Days() {
    return Array.from({ length: 7 }, (_, i) => {
      const d = new Date();
      d.setDate(d.getDate() - (6 - i));
      return { key: dateKey(d), day: DAYS[d.getDay()], num: d.getDate(), month: MONTHS[d.getMonth()] };
    });
  }

  /* ----------------------------------------------------------
     STATE — diambil dari localStorage
  ---------------------------------------------------------- */
  /**
   * habits: array of { id, name, target, createdAt }
   * logs:   { 'YYYY-MM-DD': Set<habitId> }   — disimpan sebagai array di JSON
   */
  let habits = JSON.parse(localStorage.getItem('hf_habits') || '[]');
  let logsRaw = JSON.parse(localStorage.getItem('hf_logs')   || '{}');

  /** Konversi array → Set saat memuat */
  let logs = {};
  for (const k in logsRaw) logs[k] = new Set(logsRaw[k]);

  /** Tanggal yang sedang ditampilkan di habit list */
  let selectedDate = TODAY;

  /** Apakah sedang mode edit? Simpan id habit yang diedit */
  let editingId = null;

  /* ----------------------------------------------------------
     SIMPAN KE LOCALSTORAGE
  ---------------------------------------------------------- */
  function save() {
    localStorage.setItem('hf_habits', JSON.stringify(habits));
    // Set tidak bisa di-JSON.stringify langsung, ubah ke array dulu
    const raw = {};
    for (const k in logs) raw[k] = [...logs[k]];
    localStorage.setItem('hf_logs', JSON.stringify(raw));
  }

  /* ----------------------------------------------------------
     RESET OTOMATIS — cek apakah ada log dari hari kemarin+
     (log tetap tersimpan, hanya untuk tampilan streak)
     Reset yang dimaksud: hari baru = checklist kosong otomatis
     karena kita hanya menyimpan log per hari.
  ---------------------------------------------------------- */
  // (Tidak perlu fungsi reset eksplisit — log per hari sudah otomatis
  //  "reset" karena TODAY = tanggal sekarang, dan log disimpan per tanggal.)

  /* ----------------------------------------------------------
     STREAK — hitung streak berturut-turut s.d. hari ini
  ---------------------------------------------------------- */
  function getStreakForHabit(id) {
    let streak = 0;
    const d = new Date();
    while (true) {
      const k = dateKey(d);
      if (!logs[k] || !logs[k].has(id)) break;
      streak++;
      d.setDate(d.getDate() - 1);
    }
    return streak;
  }

  /** Streak global = habit dengan streak tertinggi */
  function getBestStreak() {
    return habits.reduce((max, h) => Math.max(max, getStreakForHabit(h.id)), 0);
  }

  /* ----------------------------------------------------------
     RENDER DATE STRIP
  ---------------------------------------------------------- */
  function renderDateStrip() {
    const strip = document.getElementById('dateStrip');
    strip.innerHTML = '';
    const days = getLast7Days();

    days.forEach(({ key, day, num }) => {
      const chip = document.createElement('div');
      chip.className = 'date-chip' + (key === selectedDate ? ' active' : '');

      // Dot per habit (maks 5 titik)
      const dayLogs = logs[key] || new Set();
      const show = habits.slice(0, 5);
      const dotRow = show.map(h =>
        `<span class="dot${dayLogs.has(h.id) ? ' done' : ''}"></span>`
      ).join('');

      chip.innerHTML = `
        <span class="day-name">${day}</span>
        <span class="day-num">${num}</span>
        <div class="dot-row">${dotRow}</div>
      `;
      chip.addEventListener('click', () => {
        selectedDate = key;
        renderDateStrip();
        renderHabitList();
        renderStats();
      });
      strip.appendChild(chip);
    });
  }

  /* ----------------------------------------------------------
     RENDER STATISTIK
  ---------------------------------------------------------- */
  function renderStats() {
    const total = habits.length;
    const dayLogs = logs[selectedDate] || new Set();
    const done = habits.filter(h => dayLogs.has(h.id)).length;
    const pct = total > 0 ? Math.round((done / total) * 100) : 0;

    document.getElementById('statDone').textContent    = done;
    document.getElementById('statDoneOf').textContent  = `dari ${total} habit`;
    document.getElementById('statStreak').textContent  = getBestStreak();
    document.getElementById('statPercent').textContent = `${pct}%`;
    document.getElementById('progressFill').style.width = `${pct}%`;
  }

  /* ----------------------------------------------------------
     RENDER HABIT LIST
  ---------------------------------------------------------- */
  function renderHabitList() {
    const list = document.getElementById('habitList');
    list.innerHTML = '';

    if (habits.length === 0) {
      list.innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">✦</div>
          <div class="empty-title">Belum ada habit</div>
          <p class="empty-desc">Klik "Habit Baru" untuk mulai membangun kebiasaan.</p>
        </div>
      `;
      return;
    }

    const dayLogs = logs[selectedDate] || (logs[selectedDate] = new Set());

    habits.forEach(h => {
      const isDone = dayLogs.has(h.id);
      const streak = getStreakForHabit(h.id);

      const card = document.createElement('div');
      card.className = 'habit-card' + (isDone ? ' done-card' : '');
      card.innerHTML = `
        <div class="custom-checkbox${isDone ? ' checked' : ''}" data-id="${h.id}">
          <span class="check-icon">✓</span>
          <span class="ripple"></span>
        </div>
        <div class="habit-info">
          <div class="habit-name">${escapeHtml(h.name)}</div>
          <div class="habit-target">${escapeHtml(h.target || 'Target tidak diset')}</div>
        </div>
        <div class="streak-badge">🔥 ${streak}</div>
        <div class="habit-actions">
          <button class="habit-btn edit" data-id="${h.id}" title="Edit">✎</button>
          <button class="habit-btn delete" data-id="${h.id}" title="Hapus">✕</button>
        </div>
      `;

      // Toggle checklist
      card.querySelector('.custom-checkbox').addEventListener('click', () => toggleHabit(h.id, card));

      // Edit
      card.querySelector('.habit-btn.edit').addEventListener('click', () => openEdit(h.id));

      // Hapus
      card.querySelector('.habit-btn.delete').addEventListener('click', () => deleteHabit(h.id));

      list.appendChild(card);
    });
  }

  /** Escape HTML untuk mencegah XSS */
  function escapeHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  /* ----------------------------------------------------------
     TOGGLE CHECKLIST
  ---------------------------------------------------------- */
  function toggleHabit(id, card) {
    const dayLogs = logs[selectedDate] || (logs[selectedDate] = new Set());
    const cb = card.querySelector('.custom-checkbox');

    if (dayLogs.has(id)) {
      // Uncheck
      dayLogs.delete(id);
      cb.classList.remove('checked');
      card.classList.remove('done-card');
      card.querySelector('.habit-name').style.textDecoration = '';
    } else {
      // Check — tambah animasi ripple
      dayLogs.add(id);
      cb.classList.add('checked');
      card.classList.add('done-card');

      // Ripple animation
      const ripple = cb.querySelector('.ripple');
      ripple.classList.remove('animate');
      void ripple.offsetWidth; // reflow
      ripple.classList.add('animate');

      showToast('✓ Habit selesai!');
    }

    save();
    renderStats();
    renderDateStrip();

    // Update streak badge tanpa re-render penuh
    const streak = getStreakForHabit(id);
    card.querySelector('.streak-badge').textContent = `🔥 ${streak}`;
  }

  /* ----------------------------------------------------------
     MODAL — TAMBAH / EDIT
  ---------------------------------------------------------- */
  function openModal() {
    editingId = null;
    document.getElementById('modalTitle').textContent  = 'Tambah Habit';
    document.getElementById('submitModal').textContent = 'Simpan Habit';
    document.getElementById('inputName').value   = '';
    document.getElementById('inputTarget').value = '';
    document.getElementById('modalOverlay').classList.add('open');
    setTimeout(() => document.getElementById('inputName').focus(), 100);
  }

  function openEdit(id) {
    const h = habits.find(x => x.id === id);
    if (!h) return;
    editingId = id;
    document.getElementById('modalTitle').textContent  = 'Edit Habit';
    document.getElementById('submitModal').textContent = 'Perbarui Habit';
    document.getElementById('inputName').value   = h.name;
    document.getElementById('inputTarget').value = h.target;
    document.getElementById('modalOverlay').classList.add('open');
    setTimeout(() => document.getElementById('inputName').focus(), 100);
  }

  function closeModal() {
    document.getElementById('modalOverlay').classList.remove('open');
  }

  function submitModal() {
    const name   = document.getElementById('inputName').value.trim();
    const target = document.getElementById('inputTarget').value.trim();

    if (!name) {
      document.getElementById('inputName').focus();
      document.getElementById('inputName').style.borderColor = 'var(--accent)';
      setTimeout(() => document.getElementById('inputName').style.borderColor = '', 1200);
      return;
    }

    if (editingId) {
      // Edit existing
      const h = habits.find(x => x.id === editingId);
      if (h) { h.name = name; h.target = target; }
      showToast('✎ Habit diperbarui');
    } else {
      // Tambah baru
      habits.push({ id: Date.now().toString(), name, target, createdAt: TODAY });
      showToast('✦ Habit baru ditambahkan');
    }

    save();
    closeModal();
    renderHabitList();
    renderStats();
    renderDateStrip();
  }

  /* ----------------------------------------------------------
     HAPUS HABIT
  ---------------------------------------------------------- */
  function deleteHabit(id) {
    habits = habits.filter(h => h.id !== id);
    // Hapus juga dari semua log
    for (const k in logs) logs[k].delete(id);
    save();
    renderHabitList();
    renderStats();
    renderDateStrip();
    showToast('🗑 Habit dihapus');
  }

  /* ----------------------------------------------------------
     TOAST NOTIFIKASI
  ---------------------------------------------------------- */
  function showToast(msg) {
    const container = document.getElementById('toastContainer');
    const el = document.createElement('div');
    el.className = 'toast';
    el.textContent = msg;
    container.appendChild(el);
    // Hapus elemen setelah animasi selesai
    setTimeout(() => el.remove(), 2800);
  }

  /* ----------------------------------------------------------
     DARK MODE TOGGLE
  ---------------------------------------------------------- */
  const themeBtn = document.getElementById('themeToggle');

  function applyTheme(dark) {
    document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
    themeBtn.textContent = dark ? '☀️' : '🌙';
    localStorage.setItem('hf_theme', dark ? 'dark' : 'light');
  }

  themeBtn.addEventListener('click', () => {
    const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
    applyTheme(!isDark);
  });

  // Muat tema tersimpan / preferensi sistem
  const savedTheme = localStorage.getItem('hf_theme');
  if (savedTheme) {
    applyTheme(savedTheme === 'dark');
  } else {
    applyTheme(window.matchMedia('(prefers-color-scheme: dark)').matches);
  }

  /* ----------------------------------------------------------
     LABEL TANGGAL HARI INI DI HEADER
  ---------------------------------------------------------- */
  function renderTodayLabel() {
    const d = new Date();
    const label = `${DAYS[d.getDay()]}, ${d.getDate()} ${MONTHS[d.getMonth()]} ${d.getFullYear()}`;
    document.getElementById('todayLabel').textContent = label;
  }

  /* ----------------------------------------------------------
     EVENT LISTENERS
  ---------------------------------------------------------- */
  document.getElementById('openModal').addEventListener('click', openModal);
  document.getElementById('closeModal').addEventListener('click', closeModal);
  document.getElementById('submitModal').addEventListener('click', submitModal);

  // Tutup modal jika klik overlay
  document.getElementById('modalOverlay').addEventListener('click', e => {
    if (e.target === document.getElementById('modalOverlay')) closeModal();
  });

  // Enter = submit modal
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeModal();
    if (e.key === 'Enter' && document.getElementById('modalOverlay').classList.contains('open')) submitModal();
  });

  /* ----------------------------------------------------------
     INISIALISASI PERTAMA
  ---------------------------------------------------------- */
  renderTodayLabel();
  renderDateStrip();
  renderStats();
  renderHabitList();

  /* ----------------------------------------------------------
     AUTO REFRESH TENGAH MALAM — pastikan TODAY terupdate
  ---------------------------------------------------------- */
  function msUntilMidnight() {
    const now = new Date();
    const midnight = new Date(now);
    midnight.setHours(24, 0, 0, 0);
    return midnight - now;
  }

  setTimeout(() => {
    // Reload halaman saat tengah malam agar tanggal ter-update
    location.reload();
  }, msUntilMidnight());

</script>
</body>
</html>
